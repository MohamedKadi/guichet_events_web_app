version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: guichet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guichet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guichet_pass}
      POSTGRES_DB: ${POSTGRES_DB:-guichet_events}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guichet -d guichet_events"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guichet_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-guichet}:${POSTGRES_PASSWORD:-guichet_pass}@postgres:5432/${POSTGRES_DB:-guichet_events}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_changeinprod}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SEED_DB: ${SEED_DB:-false}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: guichet_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
