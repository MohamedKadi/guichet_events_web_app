server {
    listen 80;
    server_name eventick.shop www.eventick.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name eventick.shop www.eventick.shop;

    ssl_certificate /etc/letsencrypt/live/eventick.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventick.shop/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Forward /api/* requests to the backend
    location /api/ {
        set $backend http://backend:5000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Forward everything else to the frontend
    location / {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
